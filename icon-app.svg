<svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Fundo: gradiente escuro com alma verde -->
    <linearGradient id="bgMain" x1="256" y1="0" x2="256" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0F1A0B"/>
      <stop offset="100%" stop-color="#030503"/>
    </linearGradient>
    <!-- Brilho central -->
    <radialGradient id="centerGlow" cx="50%" cy="45%" r="50%">
      <stop offset="0%"   stop-color="#C8F060" stop-opacity=".35"/>
      <stop offset="50%"  stop-color="#85B82E" stop-opacity=".12"/>
      <stop offset="100%" stop-color="#85B82E" stop-opacity="0"/>
    </radialGradient>
    <!-- Ponto central -->
    <radialGradient id="dotGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="40%"  stop-color="#C8F060"/>
      <stop offset="100%" stop-color="#85B82E"/>
    </radialGradient>
    <!-- Borda metalica -->
    <linearGradient id="borderGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#A8C4B8" stop-opacity=".5"/>
      <stop offset="40%"  stop-color="#85B82E" stop-opacity=".7"/>
      <stop offset="70%"  stop-color="#2D6B0A" stop-opacity=".4"/>
      <stop offset="100%" stop-color="#C8F060" stop-opacity=".45"/>
    </linearGradient>
    <!-- Glow filter suave -->
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="coreFilter" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Scan line gradient -->
    <linearGradient id="scanGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#C8F060" stop-opacity="0"/>
      <stop offset="50%" stop-color="#C8F060" stop-opacity=".5"/>
      <stop offset="100%" stop-color="#C8F060" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Fundo com cantos arredondados tipo macOS squircle -->
  <rect width="512" height="512" rx="112" fill="url(#bgMain)"/>

  <!-- Reflexo de luz suave no topo -->
  <ellipse cx="256" cy="80" rx="160" ry="60"
           fill="rgba(200,240,96,0.06)"/>

  <!-- Brilho radial central -->
  <circle cx="256" cy="248" r="220" fill="url(#centerGlow)"/>

  <!-- ── ANÉIS CONCÊNTRICOS ─────────────────────────────── -->

  <!-- Anel 5 — externo, platina muito sutil -->
  <circle cx="256" cy="256" r="218" stroke="url(#borderGrad)"
          stroke-width="1.2" opacity=".35"/>

  <!-- Anel 4 — verde floresta -->
  <circle cx="256" cy="256" r="178" stroke="#2D6B0A"
          stroke-width="1.5" opacity=".5"/>
  <!-- Pontilhado no anel 4 -->
  <circle cx="256" cy="256" r="178" stroke="#85B82E"
          stroke-width=".6" stroke-dasharray="8 12" opacity=".25"/>

  <!-- Anel 3 — verde core -->
  <circle cx="256" cy="256" r="134" stroke="#85B82E"
          stroke-width="2" opacity=".7"/>

  <!-- Anel 2 — verde lime, mais brilhante -->
  <circle cx="256" cy="256" r="90" stroke="#A8D93C"
          stroke-width="2.5" opacity=".85"/>

  <!-- Anel 1 — interno, quase branco -->
  <circle cx="256" cy="256" r="46" stroke="#C8F060"
          stroke-width="2" opacity=".9"/>

  <!-- ── LINHAS DE MIRA ─────────────────────────────────── -->
  <line x1="256" y1="36"  x2="256" y2="100" stroke="#85B82E" stroke-width="1" opacity=".35"/>
  <line x1="256" y1="412" x2="256" y2="476" stroke="#85B82E" stroke-width="1" opacity=".35"/>
  <line x1="36"  y1="256" x2="100" y2="256" stroke="#85B82E" stroke-width="1" opacity=".35"/>
  <line x1="412" y1="256" x2="476" y2="256" stroke="#85B82E" stroke-width="1" opacity=".35"/>

  <!-- ── LINHA DE VARREDURA (scan) ─────────────────────── -->
  <line x1="256" y1="256" x2="420" y2="92"
        stroke="url(#scanGrad)" stroke-width="2" opacity=".55"
        stroke-linecap="round"/>
  <!-- Eco do scan (mais fina) -->
  <line x1="256" y1="256" x2="400" y2="110"
        stroke="#C8F060" stroke-width=".7" opacity=".2"
        stroke-linecap="round"/>

  <!-- ── PONTOS ORBITAIS ─────────────────────────────────── -->
  <!-- Anel 3 — ponto maior à direita (lead próximo!) -->
  <circle cx="390" cy="256" r="10" fill="#A8D93C" filter="url(#softGlow)" opacity=".95"/>
  <circle cx="390" cy="256" r="5.5" fill="#C8F060"/>

  <!-- Anel 3 — ponto superior esquerdo -->
  <circle cx="155" cy="178" r="7"  fill="#85B82E" filter="url(#softGlow)" opacity=".85"/>
  <circle cx="155" cy="178" r="3.5" fill="#A8D93C"/>

  <!-- Anel 4 — ponto distante inferior -->
  <circle cx="310" cy="400" r="6"  fill="#6BA020" filter="url(#softGlow)" opacity=".7"/>
  <circle cx="310" cy="400" r="3"  fill="#85B82E"/>

  <!-- Anel 2 — ponto pequeno -->
  <circle cx="190" cy="294" r="5"  fill="#85B82E" opacity=".8"/>
  <circle cx="190" cy="294" r="2.5" fill="#C8F060" opacity=".9"/>

  <!-- Ponto no scan line (alvo detectado) -->
  <circle cx="370" cy="142" r="8"  fill="#C8F060" filter="url(#softGlow)" opacity=".9"/>
  <circle cx="370" cy="142" r="4"  fill="#FFFFFF"/>

  <!-- ── CENTRO ──────────────────────────────────────────── -->
  <!-- Halo externo do centro -->
  <circle cx="256" cy="256" r="26" fill="rgba(200,240,96,0.12)" filter="url(#coreFilter)"/>
  <!-- Dot principal -->
  <circle cx="256" cy="256" r="18" fill="url(#dotGrad)" filter="url(#softGlow)"/>
  <!-- Highlight especular -->
  <ellipse cx="251" cy="250" rx="6" ry="5"
           fill="rgba(255,255,255,0.6)" opacity=".7"/>

  <!-- ── BORDA EXTERIOR PLATINA ─────────────────────────── -->
  <rect width="512" height="512" rx="112"
        fill="none" stroke="url(#borderGrad)" stroke-width="1.5" opacity=".4"/>

  <!-- Reflexo topo (highlight glass) -->
  <path d="M112 0 Q256 0 400 0 Q424 0 440 16 Q460 36 464 80 Q400 60 256 55 Q112 60 48 80 Q52 36 72 16 Q88 0 112 0Z"
        fill="rgba(200,240,96,0.07)"/>
</svg>