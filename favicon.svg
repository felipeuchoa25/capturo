<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#152E04"/>
      <stop offset="100%" stop-color="#030503"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#C8F060" stop-opacity="1"/>
      <stop offset="60%"  stop-color="#85B82E" stop-opacity=".7"/>
      <stop offset="100%" stop-color="#85B82E" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fundo arredondado -->
  <rect width="64" height="64" rx="13" fill="url(#bgGrad)"/>

  <!-- Anel externo — platina sutil -->
  <circle cx="32" cy="32" r="29" stroke="#A8C4B8" stroke-width=".6" opacity=".18"/>

  <!-- Anel 3 — verde forest -->
  <circle cx="32" cy="32" r="23" stroke="#2D6B0A" stroke-width=".8" opacity=".55"/>

  <!-- Anel 2 — verde core -->
  <circle cx="32" cy="32" r="16" stroke="#85B82E" stroke-width="1" opacity=".75"/>

  <!-- Anel 1 — verde lime -->
  <circle cx="32" cy="32" r="9"  stroke="#A8D93C" stroke-width="1.2" opacity=".9"/>

  <!-- Cruz de mira (targeting) -->
  <line x1="32" y1="3"  x2="32" y2="14" stroke="#85B82E" stroke-width=".7" opacity=".4"/>
  <line x1="32" y1="50" x2="32" y2="61" stroke="#85B82E" stroke-width=".7" opacity=".4"/>
  <line x1="3"  y1="32" x2="14" y2="32" stroke="#85B82E" stroke-width=".7" opacity=".4"/>
  <line x1="50" y1="32" x2="61" y2="32" stroke="#85B82E" stroke-width=".7" opacity=".4"/>

  <!-- Varredura diagonal (scan line) -->
  <line x1="32" y1="32" x2="52" y2="12" stroke="#C8F060" stroke-width=".8" opacity=".35"
        stroke-dasharray="2 3"/>

  <!-- Pontos orbitais no anel 2 -->
  <circle cx="48" cy="32" r="2"   fill="#A8D93C" opacity=".9" filter="url(#glow)"/>
  <circle cx="32" cy="16" r="1.5" fill="#85B82E" opacity=".8"/>
  <circle cx="20" cy="42" r="1.5" fill="#85B82E" opacity=".7"/>
  <circle cx="38" cy="48" r="1"   fill="#6BA020" opacity=".6"/>

  <!-- Centro — glow -->
  <circle cx="32" cy="32" r="8"   fill="url(#coreGlow)" opacity=".25"/>
  <circle cx="32" cy="32" r="3.5" fill="#C8F060" filter="url(#glow)"/>
  <circle cx="32" cy="32" r="1.8" fill="#FFFFFF" opacity=".95"/>
</svg>